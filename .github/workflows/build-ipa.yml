name: Build unsigned IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # erlaubt manuelles Starten im GitHub-UI

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          set -eo pipefail
          xcodebuild \
            -project DiscoverApp.xcodeproj \
            -target DiscoverApp \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .ipa (unsigned)
        run: |
          set -eo pipefail
          APP_PATH="build/Release-iphoneos/DiscoverApp.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App nicht gefunden unter $APP_PATH"
            echo "--- Inhalt von build/Build/Products ---"
            ls -R build/Build/Products || true
            exit 1
          fi
          rm -rf Payload DiscoverApp-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y "DiscoverApp-unsigned.ipa" Payload >/dev/null
          echo "IPA gebaut:"
          ls -lh DiscoverApp-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscoverApp-unsigned-ipa
          path: DiscoverApp-unsigned.ipa
          if-no-files-found: error
