name: Build IPA + SideStore Source

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode-Version anzeigen
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set version
        run: |
          VER="1.0.${{ github.run_number }}"
          plutil -replace CFBundleShortVersionString -string "$VER" Sources/Info.plist
          plutil -replace CFBundleVersion -string "${{ github.run_number }}" Sources/Info.plist
          # Watch-App auf dieselbe Version (Host + eingebettete Watch-App muessen synchron sein)
          plutil -replace CFBundleShortVersionString -string "$VER" WatchApp/Info.plist
          plutil -replace CFBundleVersion -string "${{ github.run_number }}" WatchApp/Info.plist
          echo "VER=$VER" >> "$GITHUB_ENV"

      - name: Archive app (unsigned)
        run: |
          set -eo pipefail
          xcodebuild \
            -project DiscoverApp.xcodeproj \
            -scheme DiscoverApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/DiscoverApp.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package .ipa
        run: |
          set -eo pipefail
          APP="build/DiscoverApp.xcarchive/Products/Applications/DiscoverApp.app"
          if [ ! -d "$APP" ]; then echo "App nicht gefunden: $APP"; exit 1; fi
          rm -rf Payload DiscoverApp.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r -y DiscoverApp.ipa Payload >/dev/null
          echo "SIZE=$(stat -f%z DiscoverApp.ipa)" >> "$GITHUB_ENV"
          ls -lh DiscoverApp.ipa

      - name: Generate apps.json (SideStore-Quelle)
        env:
          REPO: ${{ github.repository }}
          RUN: ${{ github.run_number }}
        run: |
          export DATE=$(date +%Y-%m-%d)
          python3 - <<'PY'
          import json, os
          # Changelog: obersten Abschnitt aus CHANGELOG.md ziehen (-> SideStore)
          changelog = "Build " + os.environ["RUN"]
          try:
              sec, started = [], False
              for ln in open("CHANGELOG.md", encoding="utf-8").read().splitlines():
                  if ln.startswith("## "):
                      if started: break
                      started = True; continue
                  if started: sec.append(ln)
              body = "\n".join(sec).strip()
              if body: changelog = body + "\n\n(Build " + os.environ["RUN"] + ")"
          except Exception as e:
              print("changelog read err:", e)
          data = {
            "name": "Discover (privat)",
            "identifier": "com.discover.source",
            "apps": [{
              "name": "Discover",
              "bundleIdentifier": "com.discover.app",
              "developerName": "Maximilian",
              "version": os.environ["VER"],
              "versionDate": os.environ["DATE"],
              "versionDescription": changelog,
              "downloadURL": "https://github.com/%s/releases/latest/download/DiscoverApp.ipa" % os.environ["REPO"],
              "localizedDescription": "Native Discover-App — eigener Player, Lockscreen-Audio.",
              "iconURL": "https://raw.githubusercontent.com/%s/main/Sources/Assets.xcassets/AppIcon.appiconset/icon-1024.png" % os.environ["REPO"],
              "tintColor": "1DB954",
              "size": int(os.environ["SIZE"]),
            }]
          }
          open("apps.json", "w").write(json.dumps(data, indent=2))
          print(open("apps.json").read())
          PY

      - name: Publish Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Discover Build ${{ github.run_number }}
          files: |
            DiscoverApp.ipa
            apps.json

      - name: Upload artifact (Fallback)
        uses: actions/upload-artifact@v4
        with:
          name: DiscoverApp-ipa
          path: DiscoverApp.ipa
