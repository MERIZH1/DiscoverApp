name: DiscoverApp
options:
  bundleIdPrefix: com.discover
  deploymentTarget:
    iOS: "26.0"
    watchOS: "11.0"
  createIntermediateGroups: true

schemes:
  DiscoverApp:
    build:
      targets:
        DiscoverApp: all
    run:
      config: Release
    archive:
      config: Release

targets:
  DiscoverApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
    dependencies:
      - target: DiscoverWatch
        embed: true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Discover
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.discover.app.healthcheck
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.discover.app
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  DiscoverWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
      - path: Shared
    info:
      path: WatchApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.discover.app.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Discover
