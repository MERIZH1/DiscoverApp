name: DiscoverApp
options:
  bundleIdPrefix: com.discover
  deploymentTarget:
    iOS: "16.1"
  createIntermediateGroups: true

schemes:
  DiscoverApp:
    build:
      targets:
        DiscoverApp: all
    run:
      config: Release
    archive:
      config: Release

targets:
  DiscoverApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Widget/**"
    dependencies:
      - target: DiscoverWidgetExtension
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Discover
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        NSSupportsLiveActivities: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.discover.app
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  DiscoverWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
      - path: Sources/Shared
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: Discover
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.discover.app.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
