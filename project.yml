name: DiscoverApp
options:
  bundleIdPrefix: com.discover
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

schemes:
  DiscoverApp:
    build:
      targets:
        DiscoverApp: all
    run:
      config: Release
    archive:
      config: Release

targets:
  DiscoverApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Discover
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        # HTTP (Tailscale-IP ist nicht HTTPS) erlauben:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.discover.app
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
